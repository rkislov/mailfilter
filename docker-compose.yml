services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    volumes:
      - clamav_data:/var/lib/clamav
      - clamav_config:/etc/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  policy-api:
    build:
      context: .
      dockerfile: services/policy-api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - clamav_config:/shared/clamav-config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker-scan:
    build:
      context: .
      dockerfile: services/worker-scan/Dockerfile
    env_file:
      - .env
    depends_on:
      policy-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  milter-service:
    build:
      context: .
      dockerfile: services/milter-service/Dockerfile
    env_file:
      - .env
    depends_on:
      policy-api:
        condition: service_healthy
    ports:
      - "9900:9900"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9901/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web-ui:
    build:
      context: .
      dockerfile: services/web-ui/Dockerfile
      args:
        WEB_UI_API_BASE: ${WEB_UI_API_BASE}
    depends_on:
      policy-api:
        condition: service_healthy
    ports:
      - "8081:80"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  clamav_data:
  clamav_config:
  ollama_data:
