<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AniSpam | ClamAV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { boxShadow: { panel: "0 20px 60px rgba(2, 6, 23, 0.45)" } } } };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(52,211,153,0.18),_transparent_25%),linear-gradient(180deg,_#020617_0%,_#0f172a_45%,_#020617_100%)]">
      <div class="mx-auto grid min-h-screen max-w-7xl lg:grid-cols-[18rem_1fr]">
        <aside class="border-b border-slate-800/80 bg-slate-950/80 px-6 py-8 backdrop-blur lg:sticky lg:top-0 lg:h-screen lg:border-b-0 lg:border-r">
          <p class="text-xs font-semibold uppercase tracking-[0.35em] text-emerald-300">AniSpam</p>
          <h1 class="mt-3 text-3xl font-bold">ClamAV</h1>
          <p class="mt-3 text-sm text-slate-400">Отдельное окно для обновлений сигнатур и параметров `freshclam`.</p>
          <nav class="mt-8 grid gap-2 text-sm">
            <a data-nav href="/index.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Панель</a>
            <a data-nav href="/clamav.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">ClamAV</a>
            <a data-nav href="/ai-runtime.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">AI Runtime</a>
            <a data-nav href="/providers.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Провайдеры</a>
            <a data-nav href="/lists.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Списки</a>
            <a data-nav href="/messages.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Сообщения</a>
            <a data-nav href="/audit.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Аудит</a>
            <a data-nav href="/network.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Сеть и DNS</a>
          </nav>
        </aside>
        <main class="px-4 py-6 sm:px-6 lg:px-8">
          <section class="overflow-hidden rounded-3xl border border-slate-800/80 bg-slate-900/70 p-6 shadow-panel backdrop-blur">
            <div class="flex flex-wrap items-center justify-between gap-3">
              <div>
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Антивирус</p>
                <h2 class="mt-2 text-2xl font-semibold text-white">Зеркала обновлений ClamAV</h2>
              </div>
              <span class="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.25em] text-emerald-200">Web configurable</span>
            </div>
            <form id="clamav-form" class="mt-6 grid gap-4 xl:grid-cols-2">
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Основное зеркало баз</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="database_mirror" required />
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Приватное зеркало</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="private_mirror" />
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>DNS-источник информации о базах</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="dns_database_info" />
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Проверок в сутки</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="checks" type="number" min="1" max="96" />
              </label>
              <label class="flex items-center gap-3 rounded-2xl border border-slate-800 bg-slate-950/40 px-4 py-4 text-sm text-slate-300">
                <input class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-emerald-400 focus:ring-emerald-300" name="script_updated" type="checkbox" />
                <span>Разрешить scripted updates</span>
              </label>
              <label class="flex items-center gap-3 rounded-2xl border border-slate-800 bg-slate-950/40 px-4 py-4 text-sm text-slate-300">
                <input class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-emerald-400 focus:ring-emerald-300" name="compress_local_database" type="checkbox" />
                <span>Сжимать локальную базу</span>
              </label>
              <label class="flex items-center gap-3 rounded-2xl border border-slate-800 bg-slate-950/40 px-4 py-4 text-sm text-slate-300 xl:col-span-2">
                <input class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-emerald-400 focus:ring-emerald-300" name="notify_clamd" type="checkbox" />
                <span>Уведомлять `clamd` после обновления</span>
              </label>
              <div class="xl:col-span-2 flex flex-wrap items-center gap-3">
                <button type="submit" class="rounded-xl bg-emerald-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">Сохранить настройки</button>
                <p class="text-sm text-slate-400">После сохранения генерируется общий `freshclam.conf` для контейнера `clamav`.</p>
              </div>
            </form>
            <pre id="clamav-config-path" class="mt-6 overflow-x-auto rounded-2xl border border-slate-800 bg-slate-950/70 p-4 text-sm text-slate-300"></pre>
          </section>
        </main>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
