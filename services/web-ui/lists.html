<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AniSpam | Белые и черные списки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { boxShadow: { panel: "0 20px 60px rgba(2, 6, 23, 0.45)" } } } };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(52,211,153,0.18),_transparent_25%),linear-gradient(180deg,_#020617_0%,_#0f172a_45%,_#020617_100%)]">
      <div class="mx-auto grid min-h-screen max-w-7xl lg:grid-cols-[18rem_1fr]">
        <aside class="border-b border-slate-800/80 bg-slate-950/80 px-6 py-8 backdrop-blur lg:sticky lg:top-0 lg:h-screen lg:border-b-0 lg:border-r">
          <p class="text-xs font-semibold uppercase tracking-[0.35em] text-emerald-300">AniSpam</p>
          <h1 class="mt-3 text-3xl font-bold">Списки</h1>
          <p class="mt-3 text-sm text-slate-400">Управление белыми и черными списками отправителей, доменов, IP и получателей.</p>
          <nav class="mt-8 grid gap-2 text-sm">
            <a data-nav href="/index.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Панель</a>
            <a data-nav href="/clamav.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">ClamAV</a>
            <a data-nav href="/ai-runtime.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">AI Runtime</a>
            <a data-nav href="/providers.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Провайдеры</a>
            <a data-nav href="/lists.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Списки</a>
            <a data-nav href="/messages.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Сообщения</a>
            <a data-nav href="/audit.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Аудит</a>
            <a data-nav href="/network.html" class="rounded-xl border border-transparent px-4 py-3 transition hover:border-slate-700 hover:bg-slate-900">Сеть и DNS</a>
          </nav>
        </aside>
        <main class="space-y-6 px-4 py-6 sm:px-6 lg:px-8">
          <section class="overflow-hidden rounded-3xl border border-slate-800/80 bg-slate-900/70 p-6 shadow-panel backdrop-blur">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Политики</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">Добавить запись</h2>
            </div>
            <form id="lists-form" class="mt-6 grid gap-4 xl:grid-cols-2">
              <input type="hidden" name="organization_id" value="1" />
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Тип списка</span>
                <select class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" name="list_type">
                  <option value="allow">Белый список</option>
                  <option value="block">Черный список</option>
                </select>
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Тип совпадения</span>
                <select class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" name="match_type">
                  <option value="sender">Отправитель полностью</option>
                  <option value="sender_domain">Домен отправителя</option>
                  <option value="client_ip">IP клиента</option>
                  <option value="helo">HELO/EHLO</option>
                  <option value="recipient">Получатель</option>
                  <option value="subject_contains">Тема содержит</option>
                </select>
              </label>
              <label class="grid gap-2 text-sm text-slate-300 xl:col-span-2">
                <span>Значение</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="value" placeholder="user@example.com или 192.168.1.10" required />
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Действие</span>
                <select class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" name="action">
                  <option value="accept">Принять</option>
                  <option value="reject">Отклонить</option>
                  <option value="quarantine">Карантин</option>
                  <option value="tempfail">Временный отказ</option>
                </select>
              </label>
              <label class="grid gap-2 text-sm text-slate-300">
                <span>Комментарий</span>
                <input class="rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400" name="comment" placeholder="Причина или примечание" />
              </label>
              <label class="flex items-center gap-3 rounded-2xl border border-slate-800 bg-slate-950/40 px-4 py-4 text-sm text-slate-300 xl:col-span-2">
                <input class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-emerald-400 focus:ring-emerald-300" name="enabled" type="checkbox" checked />
                <span>Сделать запись активной сразу</span>
              </label>
              <div class="xl:col-span-2">
                <button type="submit" class="rounded-xl bg-emerald-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">Добавить запись</button>
              </div>
            </form>
          </section>

          <section class="overflow-hidden rounded-3xl border border-slate-800/80 bg-slate-900/70 p-6 shadow-panel backdrop-blur">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Текущие записи</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">Белый и черный список</h2>
            </div>
            <div id="lists-table" class="mt-6 grid gap-3"></div>
          </section>
        </main>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
